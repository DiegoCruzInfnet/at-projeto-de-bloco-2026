name: CI Java Maven

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  build:
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8
        env:
          MYSQL_ROOT_PASSWORD: ${{ secrets.DB_PASSWORD }}
          MYSQL_DATABASE: loja
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h localhost"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=3

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Instalar Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Cache do Maven
        uses: actions/cache@v4
        with:
          path: ~/.m2
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      - name: Criar db.properties
        env:
          DB_URL: ${{ secrets.DB_URL }}
          DB_USER: ${{ secrets.DB_USER }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
        run: |
          echo "db.url=$DB_URL" > src/main/resources/db.properties
          echo "db.user=$DB_USER" >> src/main/resources/db.properties
          echo "db.password=$DB_PASSWORD" >> src/main/resources/db.properties

      - name: Criar tabela no banco
        env:
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
        run: |
          mysql -h 127.0.0.1 -u root -p$DB_PASSWORD loja < src/main/resources/schema.sql

      - name: Rodar testes
        run: mvn test

      - name: Salvar relatório JaCoCo
        uses: actions/upload-artifact@v4
        with:
          name: relatorio-cobertura
          path: target/site/jacoco/

      - name: Build
        run: mvn clean package -DskipTests

      - name: Salvar JAR como artefato
        uses: actions/upload-artifact@v4
        with:
          name: loja-java-jar
          path: target/*.jar

      - name: Resumo da execução
        run: |
          echo "## ✅ Build concluído!" >> $GITHUB_STEP_SUMMARY
          echo "- Banco: MySQL 8" >> $GITHUB_STEP_SUMMARY
          echo "- Tabela: criada" >> $GITHUB_STEP_SUMMARY
          echo "- Testes: executados" >> $GITHUB_STEP_SUMMARY
          echo "- JAR: gerado e salvo" >> $GITHUB_STEP_SUMMARY