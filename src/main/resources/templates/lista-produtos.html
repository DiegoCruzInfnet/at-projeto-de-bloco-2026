<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Lista de Produtos</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
    <div class="container">
        <a class="navbar-brand" href="#">Loja Java Geek</a>
        <a class="btn btn-success" th:href="@{/produtos/novo}">+ Novo Produto</a>
    </div>
</nav>

<div class="container">
    <div class="card shadow-sm">
        <div class="card-header bg-primary text-white">
            <h4 class="mb-0">Produtos Disponíveis</h4>
        </div>
        <div class="card-body">
            <div class="table-responsive">
                <table class="table table-striped align-middle text-center">
                    <thead class="table-dark">
                    <tr>
                        <th>ID</th>
                        <th>Nome</th>
                        <th>Descrição</th>
                        <th>Preço</th>
                        <th>Qtd</th>
                        <th>Ações</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="produto : ${produtos}">
                        <td th:text="${produto.id}">1</td>
                        <td th:text="${produto.nome}">Caneca</td>
                        <td th:text="${produto.descricao}">Caneca Star Wars</td>
                        <td th:text="${#numbers.formatCurrency(produto.preco)}">R$ 50,00</td>
                        <td th:text="${produto.quantidade}">10</td>
                        <td>
                            <a th:href="@{/produtos/editar/{id}(id=${produto.id})}" class="btn btn-sm btn-warning me-1">Editar</a>
                            <a th:href="@{/produtos/deletar/{id}(id=${produto.id})}"
                               onclick="return confirm('Tem certeza que deseja deletar este produto?');"
                               class="btn btn-sm btn-danger">Deletar</a>
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
